%YAML:1.0

#common parameters
#support: 1 imu 1 cam; 1 imu 2 cam: 2 cam; 
imu: 1         
num_of_cam: 2


imu_topic: "/mavros/imu/data"
image0_topic: "/camera/infra1/image_rect_raw"
image1_topic: "/camera/infra2/image_rect_raw"




output_path: "/home/uav/Desktop/uav_project/gameuav/runtime/vins_output"
save_result: 0     # disable per-frame txt logging on the UAV; set 1 for offline VINS debugging


cam0_calib: "left.yaml"
cam1_calib: "right.yaml"
image_width: 640
image_height: 480
   

# Fixed result from the 2026-07-21 sensor-only calibration after the camera mount changed.
estimate_extrinsic: 0
body_T_cam0: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [-0.016096545061367262, -0.015700903811747269, 0.9997471594641227, 0.07055112327864391,
          -0.9996642639079700, -0.020051620227017786, -0.016410118573861265, 0.004686868613006284,
          0.020304204057881858, -0.9996756544728727, -0.015372870643122871, 0.09358857872565511,
          0.0, 0.0, 0.0, 1.0]
body_T_cam1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [-0.015918100875102592, -0.015750094252152513, 0.9997492428582173, 0.06939098895200034,
          -0.9996688781746539, -0.019966880042650459, -0.016231380421639519, -0.045520639979554404,
          0.020217518976363646, -0.9996765768149273, -0.015427044241514754, 0.09432101771237010,
          0.0, 0.0, 0.0, 1.0]
            
#Multiple thread support
multiple_thread: 1

#feature traker paprameters
max_cnt: 120            # max feature number in feature tracking
min_dist: 30            # min distance between two features 
freq: 10                # frequence (Hz) of publish tracking result. At least 10Hz for good estimation. If set 0, the frequence will be same as raw image 
F_threshold: 1.0        # ransac threshold (pixel)
show_track: 0           # publish tracking image as topic
flow_back: 1            # perform forward and backward optical flow to improve feature tracking accuracy

#optimization parameters
max_solver_time: 0.04  # max solver itration time (ms), to guarantee real time
max_num_iterations: 8   # max solver itrations, to guarantee real time
keyframe_parallax: 10.0 # keyframe selection threshold (pixel)

#imu parameters       The more accurate parameters you provide, the better performance
acc_n: 0.02622310268743605
gyr_n: 0.060450171300378906
acc_w: 0.000684458766347085
gyr_w: 0.0016224083807518657
g_norm: 9.805         # gravity magnitude

#unsynchronization parameters
estimate_td: 0
td: 0.0017191652713265113           # image_time + td = IMU time

#loop closure parameters
load_previous_pose_graph: 0        # load and reuse previous pose graph; load from 'pose_graph_save_path'
pose_graph_save_path: "/home/uav/Desktop/uav_project/gameuav/runtime/pose_graph/" # save and load path
save_image: 1                   # save image in pose graph for visualization prupose; you can close this function by setting 0 
