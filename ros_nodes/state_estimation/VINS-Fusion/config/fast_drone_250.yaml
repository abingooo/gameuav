%YAML:1.0

#common parameters
#support: 1 imu 1 cam; 1 imu 2 cam: 2 cam; 
imu: 1         
num_of_cam: 2


imu_topic: "/mavros/imu/data"
image0_topic: "/camera/infra1/image_rect_raw"
image1_topic: "/camera/infra2/image_rect_raw"




output_path: "/home/uav/Desktop/uav_project/gameuav/runtime/vins_output"
save_result: 0     # disable per-frame txt logging on the UAV; set 1 for offline VINS debugging


cam0_calib: "left.yaml"
cam1_calib: "right.yaml"
image_width: 640
image_height: 480
   

# Extrinsic parameter between IMU and Camera.
estimate_extrinsic: 0   # Use the calibrated transforms below; online optimization drifted while stationary.
                        # 1  Have an initial guess about extrinsic parameters. We will optimize around your initial guess.

# online
body_T_cam0: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [ -2.1792499154815737e-03, -1.9012189238187427e-02,
       9.9981687699807187e-01, 2.3460848181173172e-01,
       -9.9999688249343355e-01, -1.1773141828781419e-03,
       -2.2020296839793674e-03, -1.7820079802113198e-02,
       1.2189639946306174e-03, -9.9981855883539517e-01,
       -1.9009564305729310e-02, 3.3859462838956099e-02, 0., 0., 0., 1. ]
body_T_cam1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [ -7.2738768496369843e-03, -2.3355546013193285e-02,
       9.9970075982065865e-01, 2.1976104851172049e-01,
       -9.9997317236156946e-01, -6.9318932714135251e-04,
       -7.2920535993515334e-03, -6.9064874709730356e-02,
       8.6329179041294557e-04, -9.9972698170999807e-01,
       -2.3349877265250729e-02, 3.7421089901407092e-02, 0., 0., 0., 1. ]

